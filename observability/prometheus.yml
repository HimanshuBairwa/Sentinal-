global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:9100']
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8081']
  - job_name: 'risk-engine'
    static_configs:
      - targets: ['risk-engine:8082']
  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:8083']
  - job_name: 'alert-service'
    static_configs:
      - targets: ['alert-service:8084']
